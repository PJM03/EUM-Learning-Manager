<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>E:UM Learning Manager - Quiz</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0" />
    <link href="./global.css" rel="stylesheet" />
    <link href="./question.css" rel="stylesheet" />
</head>
<body>
    <header id="mobile-header">
        <div class="header-title"><span class="material-symbols-rounded">school</span> E:UM</div>
        <button class="btn btn-outline" onclick="toggleSidebar()" id="mobile-sidebar-toggle" style="padding: 6px;"><span class="material-symbols-rounded">menu</span></button>
    </header>

    <div id="app-wrapper">
        <div id="sidebar-overlay" onclick="toggleSidebar()"></div>
        <aside id="sidebar">
            <div style="padding: 24px; border-bottom: 1px solid var(--border);" id="sidebar-header">
                <div style="font-weight: 700; font-size: 1.2rem; margin-bottom: 4px;" id="sidebar-title">학습 목록</div>
                <div style="font-size: 0.9rem; font-weight: normal; color: var(--secondary);" id="sidebar-subtitle"></div>
            </div>
            <div id="question-list" style="overflow-y: auto; flex: 1; padding: 12px;"></div>
        </aside>

        <main id="main-content">
            <div id="quiz-outer-wrapper">
                <div class="progress-container"><div id="progress-bar" class="progress-bar"></div></div>
                <div style="padding: 24px; display: flex; justify-content: space-between; align-items: center; max-width: 800px; margin: 0 auto; width: 100%; flex-shrink: 0;">
                    <div style="font-weight: 600; color: var(--secondary);" id="q-counter">문제 1 / 10</div>
                    <span class="badge-status badge-ing" id="q-type-badge">객관식</span>
                </div>
                <div id="quiz-wrapper" class="slide-wrapper container" style="max-width: 800px;"></div>
            </div>

            <footer id="nav-footer">
                <div class="footer-inner">
                    <div style="display: flex; gap: 8px;">
                        <button class="btn btn-outline mobile-only" onclick="toggleSidebar()"><span class="material-symbols-rounded" id="sidebar-icon">menu_open</span> 목록</button>
                        <button class="btn btn-outline" onclick="goHome()" style="color: #24292f; border-color: var(--border);"><span class="material-symbols-rounded">home</span> <span class="desktop-only">홈으로</span></button>
                    </div>
                    
                    <div style="display: flex; gap: 8px;" id="nav-buttons-right">
                        <button class="btn btn-outline" id="prev-btn" onclick="moveQuestion(-1)"><span class="material-symbols-rounded">chevron_left</span> <span class="desktop-only">이전</span></button>
                        <button class="btn btn-filled" id="next-btn" onclick="moveQuestion(1)"><span class="desktop-only">다음</span> <span class="material-symbols-rounded">chevron_right</span></button>
                        <button class="btn btn-filled hide" id="final-submit-btn" onclick="submitSession()" style="background-color: var(--on-primary-container);">
                            <span class="material-symbols-rounded">check_circle</span> 제출
                        </button>
                    </div>
                </div>
            </footer>
        </main>
    </div>

    <script src="./global.js"></script>
    <script src="./question.js"></script>
</body>
</html>
