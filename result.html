<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>E:UM Learning Manager - Results</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0" />
    <link href="./global.css" rel="stylesheet" />
    <link href="./result.css" rel="stylesheet" />
</head>
<body>
    <header id="mobile-header">
        <div class="header-title"><span class="material-symbols-rounded">school</span> E:UM</div>
        <button class="btn btn-outline" onclick="toggleSidebar()" id="mobile-sidebar-toggle" style="padding: 6px;"><span class="material-symbols-rounded">menu</span></button>
    </header>

    <div id="app-wrapper">
        <div id="sidebar-overlay" onclick="toggleSidebar()"></div>
        <aside id="sidebar">
            <div style="padding: 24px; border-bottom: 1px solid var(--border);" id="sidebar-header">
                <div style="font-weight: 700; font-size: 1.2rem; margin-bottom: 4px;" id="sidebar-title">학습 목록</div>
                <div style="font-size: 0.9rem; font-weight: normal; color: var(--secondary);" id="sidebar-subtitle"></div>
            </div>
            
            <div id="result-filters" style="padding: 12px; border-bottom: 1px solid var(--border); display: flex; gap: 6px; overflow-x: auto;">
                <button class="filter-chip active" onclick="filterResults('ALL')">전체</button>
                <button class="filter-chip" onclick="filterResults('CORRECT')">정답</button>
                <button class="filter-chip" onclick="filterResults('INCORRECT')">오답</button>
                <button class="filter-chip" onclick="filterResults('SEN')">서술형</button>
            </div>

            <div id="question-list" style="overflow-y: auto; flex: 1; padding: 12px;"></div>
        </aside>

        <main id="main-content">
            <div id="result-view" style="padding: 40px 24px; overflow-y: auto; height: 100%; flex: 1; background-color: var(--bg-color);"></div>

            <footer id="nav-footer">
                <div class="footer-inner">
                    <div style="display: flex; gap: 8px;">
                        <button class="btn btn-outline mobile-only" onclick="toggleSidebar()"><span class="material-symbols-rounded" id="sidebar-icon">menu_open</span> 목록</button>
                        <button class="btn btn-outline" onclick="goHome()" style="color: #24292f; border-color: var(--border);"><span class="material-symbols-rounded">home</span> <span class="desktop-only">홈으로</span></button>
                    </div>
                </div>
            </footer>
        </main>
    </div>

    <script src="./global.js"></script>
    <script src="./result.js"></script>
</body>
</html>
